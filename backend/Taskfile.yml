version: '3'

tasks:
  default:
    deps: [install, build]

  install:
    desc: Download Go dependencies
    cmds:
      - go mod download

  build:
    desc: Build the binary
    cmds:
      - CGO_ENABLED=0 go build -o ./bin/kite ./cmd/http

  start:dev:
    desc: Run with hot reload (requires air)
    cmds:
      - air -c .air.toml

  start:
    desc: Run the binary
    cmds:
      - ./bin/kite

  test:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -cover -timeout 30s ./...

  test:integration:
    desc: Run integration tests (requires running Postgres)
    cmds:
      - go test -v -race -timeout 60s -tags integration ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  migrate:up:
    desc: Run migrations up
    cmds:
      - migrate -path ./db/migrations -database "$DATABASE_URL" up

  migrate:down:
    desc: Roll back one migration
    cmds:
      - migrate -path ./db/migrations -database "$DATABASE_URL" down 1
